<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="icon" href="assets/chatgpt.svg" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <span class="logo">ChatGPT</span>
    </header>

    <main class="container">
        <div class="login-box">
            <h1 class="title">登入或註冊</h1>
            <p class="subtitle">你將獲得更聰明的回應，並且可以上傳檔案和圖像等內容。</p>

            <div class="input-group">
                <label class="floating-label">電子郵件地址</label>
                <input type="email" class="email-input">
            </div>

            <button class="btn-primary">繼續</button>

            <div class="divider">
                <span>或</span>
            </div>

            <div class="social-list">
                <button class="btn-outline">
                    <img src="assets/google.svg" alt=""> 使用 Google 帳戶繼續
                </button>
                <button class="btn-outline">
                    <img src="assets/apple.svg" alt=""> 使用 Apple 帳戶繼續
                </button>
                <button class="btn-outline">
                    <img src="assets/microsoft.svg" alt=""> 使用 Microsoft 帳戶繼續
                </button>
                <button class="btn-outline">
                    <img src="assets/phone.svg" alt=""> 使用電話繼續
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
